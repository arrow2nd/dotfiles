# tmux config shaped after the current Zellij workflow.

set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g mouse on
set -g focus-events on
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Image/graphics friendliness. Sixel still depends on the outer terminal and
# the image tool, but these options keep tmux from being the first blocker.
set -g allow-passthrough on
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:clipboard"
set -as terminal-features ",*:hyperlinks"
set -as terminal-features ",*:sixel"
set -g set-clipboard on
set -s extended-keys on

# Keep the Zellij session habit by starting tmux with:
# tmux -f ~/.config/tmux/tmux.conf new-session -A -s nyaan

# WezTerm-style direct Alt bindings (no prefix). Mirrors ~/.config/wezterm/wezterm.lua.
# A WezTerm tab maps to a tmux window, a WezTerm pane to a tmux pane.
set -g prefix None
unbind C-b

# Tabs (= windows).
bind -n M-t new-window -a -c "#{pane_current_path}"      # spawn just after the current tab
bind -n M-[ previous-window
bind -n M-] next-window
bind -n "M-{" swap-window -d -t -1
bind -n "M-}" swap-window -d -t +1
bind -n C-T choose-tree -Zw                              # tab navigator (Ctrl+Shift+t)
bind -n M-r command-prompt -I "#W" "rename-window '%%'"  # rename tab (no WezTerm equivalent)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Panes.
bind -n M-v split-window -h -c "#{pane_current_path}"    # WezTerm SplitHorizontal: left/right
bind -n M-s split-window -v -c "#{pane_current_path}"    # WezTerm SplitVertical: top/bottom
bind -n M-x confirm-before -p "kill-pane? (y/n)" kill-pane
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D
bind -n M-9 display-panes -d 0 "swap-pane -t '%%'"       # PaneSelect SwapWithActive
bind -n M-0 display-panes -d 0 "select-pane -t '%%'"     # PaneSelect

# Zoom / resize (no WezTerm equivalent). Alt+Shift+hjkl resizes; root table can't
# repeat, so each press moves a bigger step.
bind -n M-z resize-pane -Z
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-K resize-pane -U 5
bind -n M-J resize-pane -D 5

# Search / copy mode (WezTerm Search / QuickSelect).
bind -n M-Enter copy-mode
bind -n M-/ copy-mode \; command-prompt -p "search:" "send -X search-backward '%%'"

# Copy/search mode: vi-flavoured navigation and clipboard integration.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi C-c send -X cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi p send -X search-reverse

# Minai-ish status line.
set -g status 2
set -g status-position top
set -g status-interval 2
set -g status-style "fg=#E8E2D6,bg=default"
set -g status-format[1] ""
set -g status-left-length 40
set -g status-right-length 120
set -g @tab_icon "#{?#{m/r:^cmake$,#{pane_current_command}},,#{?#{m/r:^make$,#{pane_current_command}},,#{?#{m/r:^cat$,#{pane_current_command}},󰄛,#{?#{m/r:^bat$,#{pane_current_command}},󰭟,#{?#{m/r:^vim,#{pane_current_command}},,#{?#{m/r:^nvim,#{pane_current_command}},,#{?#{m/r:^bash,#{pane_current_command}},,#{?#{m/r:^zsh,#{pane_current_command}},,#{?#{m/r:^yazi,#{pane_current_command}},,#{?#{m/r:^node,#{pane_current_command}},,#{?#{m/r:^deno,#{pane_current_command}},󰛦,#{?#{m/r:^bun$,#{pane_current_command}},󰛦,#{?#{m/r:^python,#{pane_current_command}},,#{?#{m/r:^ruby,#{pane_current_command}},,#{?#{m/r:^go$,#{pane_current_command}},󰟓,#{?#{m/r:^cargo,#{pane_current_command}},󱘗,#{?#{m/r:^java,#{pane_current_command}},,#{?#{m/r:^git$,#{pane_current_command}},,#{?#{m/r:^docker,#{pane_current_command}},󰡨,#{?#{m/r:^gh$,#{pane_current_command}},,#{?#{m/r:^wezterm$,#{pane_current_command}},,#{?#{m/r:^spotify_player$,#{pane_current_command}},,#{?#{m/r:^op$,#{pane_current_command}},󰯅,#{pane_current_command}}}}}}}}}}}}}}}}}}}}}}}}"
set -g status-left "#[fg=#232934,bg=#7ea1b6,bold] #{session_name} #[default]"
set -g status-right "#{?window_synchronize_flag,#[fg=#232934 bg=#d4af8d] SYNC ,}#[fg=#B3B8C2,bg=default] %H:%M "
set -g window-status-separator ""
setw -g window-status-format "#[fg=#6F7683,bg=default]  #{?automatic-rename,#{E:@tab_icon},#W} "
setw -g window-status-current-format "#[fg=#E8E2D6,bg=default,bold]  #{?automatic-rename,#{E:@tab_icon},#W} "
set -g pane-border-style "fg=#818181"
set -g pane-active-border-style "fg=#7ea1b6"
set -g message-style "fg=#E8E2D6,bg=#4F6575"
set -g mode-style "fg=#E8E2D6,bg=#4F6575"
