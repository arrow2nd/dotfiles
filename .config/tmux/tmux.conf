# tmux config shaped after the current Zellij workflow.

set -g default-terminal "tmux-256color"
set -g history-limit 10000
set -g mouse on
set -g focus-events on
set -g escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Image/graphics friendliness. Sixel still depends on the outer terminal and
# the image tool, but these options keep tmux from being the first blocker.
set -g allow-passthrough on
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:clipboard"
set -as terminal-features ",*:hyperlinks"
set -as terminal-features ",*:sixel"
set -g set-clipboard on
set -s extended-keys on

# Keep the Zellij session habit by starting tmux with:
# tmux -f ~/.config/tmux/tmux.conf new-session -A -s nyaan

# Prefix: keep tmux default and make Alt-b enter a tmux-like key table.
set -g prefix C-b
bind C-b send-prefix
bind -n M-b switch-client -T prefix

# Direct Alt keys used from Zellij normal mode.
bind -n M-h if -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l if -F "#{pane_at_right}" "next-window" "select-pane -R"
bind -n M-Left if -F "#{pane_at_left}" "previous-window" "select-pane -L"
bind -n M-Down select-pane -D
bind -n M-Up select-pane -U
bind -n M-Right if -F "#{pane_at_right}" "next-window" "select-pane -R"
bind -n M-n split-window -h -c "#{pane_current_path}"
bind -n M-+ resize-pane -Z
bind -n M-= resize-pane -Z
bind -n M-- resize-pane -Z
bind -n M-[ previous-layout
bind -n M-] next-layout
bind -n M-i swap-window -t -1
bind -n M-o swap-window -t +1
bind -n M-q confirm-before -p "kill-session? (y/n)" kill-session

# Zellij-like modal key tables.
bind -n M-a switch-client -T pane-mode
bind -n M-t switch-client -T tab-mode
bind -n M-r switch-client -T resize-mode
bind -n M-m switch-client -T move-mode
bind -n M-s copy-mode
bind -n M-w choose-tree -Zs

# Pane mode.
bind -T pane-mode h select-pane -L
bind -T pane-mode j select-pane -D
bind -T pane-mode k select-pane -U
bind -T pane-mode l select-pane -R
bind -T pane-mode Left select-pane -L
bind -T pane-mode Down select-pane -D
bind -T pane-mode Up select-pane -U
bind -T pane-mode Right select-pane -R
bind -T pane-mode n split-window -c "#{pane_current_path}"
bind -T pane-mode r split-window -h -c "#{pane_current_path}"
bind -T pane-mode d split-window -v -c "#{pane_current_path}"
bind -T pane-mode f resize-pane -Z
bind -T pane-mode c command-prompt -I "#T" "select-pane -T '%%'"
bind -T pane-mode x confirm-before -p "kill-pane? (y/n)" kill-pane
bind -T pane-mode p select-pane -t :.+
bind -T pane-mode z if -F "#{==:#{pane_border_status},off}" "set -g pane-border-status top" "set -g pane-border-status off"
bind -T pane-mode M-a switch-client -T root
bind -T pane-mode Escape switch-client -T root

# Window/tab mode.
bind -T tab-mode h previous-window
bind -T tab-mode j next-window
bind -T tab-mode k previous-window
bind -T tab-mode l next-window
bind -T tab-mode Left previous-window
bind -T tab-mode Down next-window
bind -T tab-mode Up previous-window
bind -T tab-mode Right next-window
bind -T tab-mode Tab last-window
bind -T tab-mode n new-window -c "#{pane_current_path}"
bind -T tab-mode r command-prompt -I "#W" "rename-window '%%'"
bind -T tab-mode x confirm-before -p "kill-window? (y/n)" kill-window
bind -T tab-mode s set-window-option synchronize-panes
bind -T tab-mode b break-pane
bind -T tab-mode [ break-pane -b
bind -T tab-mode ] break-pane -a
bind -T tab-mode 1 select-window -t 1
bind -T tab-mode 2 select-window -t 2
bind -T tab-mode 3 select-window -t 3
bind -T tab-mode 4 select-window -t 4
bind -T tab-mode 5 select-window -t 5
bind -T tab-mode 6 select-window -t 6
bind -T tab-mode 7 select-window -t 7
bind -T tab-mode 8 select-window -t 8
bind -T tab-mode 9 select-window -t 9
bind -T tab-mode M-t switch-client -T root
bind -T tab-mode Escape switch-client -T root

# Resize mode. Repeating keeps resizing while the key is held/repeated.
bind -r -T resize-mode h resize-pane -L 3
bind -r -T resize-mode j resize-pane -D 3
bind -r -T resize-mode k resize-pane -U 3
bind -r -T resize-mode l resize-pane -R 3
bind -r -T resize-mode Left resize-pane -L 3
bind -r -T resize-mode Down resize-pane -D 3
bind -r -T resize-mode Up resize-pane -U 3
bind -r -T resize-mode Right resize-pane -R 3
bind -r -T resize-mode H resize-pane -R 3
bind -r -T resize-mode J resize-pane -U 3
bind -r -T resize-mode K resize-pane -D 3
bind -r -T resize-mode L resize-pane -L 3
bind -r -T resize-mode + resize-pane -Z
bind -r -T resize-mode = resize-pane -Z
bind -r -T resize-mode - resize-pane -Z
bind -T resize-mode M-r switch-client -T root
bind -T resize-mode Escape switch-client -T root

# Move mode.
bind -T move-mode h if -F "#{pane_at_left}" "" "swap-pane -t '{left-of}'"
bind -T move-mode j if -F "#{pane_at_bottom}" "" "swap-pane -t '{down-of}'"
bind -T move-mode k if -F "#{pane_at_top}" "" "swap-pane -t '{up-of}'"
bind -T move-mode l if -F "#{pane_at_right}" "" "swap-pane -t '{right-of}'"
bind -T move-mode Left if -F "#{pane_at_left}" "" "swap-pane -t '{left-of}'"
bind -T move-mode Down if -F "#{pane_at_bottom}" "" "swap-pane -t '{down-of}'"
bind -T move-mode Up if -F "#{pane_at_top}" "" "swap-pane -t '{up-of}'"
bind -T move-mode Right if -F "#{pane_at_right}" "" "swap-pane -t '{right-of}'"
bind -T move-mode n rotate-window -D
bind -T move-mode p rotate-window -U
bind -T move-mode Tab rotate-window -D
bind -T move-mode M-m switch-client -T root
bind -T move-mode Escape switch-client -T root

# Prefix/tmux-mode compatibility from the Zellij tmux table.
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" "rename-window '%%'"
bind Space next-layout
bind z resize-pane -Z
bind o select-pane -t :.+
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Copy/search mode: vi-flavoured navigation and clipboard integration.
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel
bind -T copy-mode-vi C-c send -X cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi n send -X search-again
bind -T copy-mode-vi p send -X search-reverse

# Minai-ish status line.
set -g status 2
set -g status-position top
set -g status-interval 2
set -g status-style "fg=#E8E2D6,bg=default"
set -g status-format[1] ""
set -g status-left-length 40
set -g status-right-length 120
set -g @tab_icon "#{?#{m/r:^cmake$,#{pane_current_command}},,#{?#{m/r:^make$,#{pane_current_command}},,#{?#{m/r:^cat$,#{pane_current_command}},󰄛,#{?#{m/r:^bat$,#{pane_current_command}},󰭟,#{?#{m/r:^vim,#{pane_current_command}},,#{?#{m/r:^nvim,#{pane_current_command}},,#{?#{m/r:^bash,#{pane_current_command}},,#{?#{m/r:^zsh,#{pane_current_command}},,#{?#{m/r:^yazi,#{pane_current_command}},,#{?#{m/r:^node,#{pane_current_command}},,#{?#{m/r:^deno,#{pane_current_command}},󰛦,#{?#{m/r:^bun$,#{pane_current_command}},󰛦,#{?#{m/r:^python,#{pane_current_command}},,#{?#{m/r:^ruby,#{pane_current_command}},,#{?#{m/r:^go$,#{pane_current_command}},󰟓,#{?#{m/r:^cargo,#{pane_current_command}},󱘗,#{?#{m/r:^java,#{pane_current_command}},,#{?#{m/r:^git$,#{pane_current_command}},,#{?#{m/r:^docker,#{pane_current_command}},󰡨,#{?#{m/r:^gh$,#{pane_current_command}},,#{?#{m/r:^wezterm$,#{pane_current_command}},,#{?#{m/r:^spotify_player$,#{pane_current_command}},,#{?#{m/r:^op$,#{pane_current_command}},󰯅,#{pane_current_command}}}}}}}}}}}}}}}}}}}}}}}}"
set -g status-left "#[fg=#232934,bg=#7ea1b6,bold] #{session_name} #[default]"
set -g status-right "#{?window_synchronize_flag,#[fg=#232934 bg=#d4af8d] SYNC ,}#[fg=#B3B8C2,bg=default] %H:%M "
set -g window-status-separator ""
setw -g window-status-format "#[fg=#6F7683,bg=default]  #{?automatic-rename,#{E:@tab_icon},#W} "
setw -g window-status-current-format "#[fg=#E8E2D6,bg=default,bold]  #{?automatic-rename,#{E:@tab_icon},#W} "
set -g pane-border-style "fg=#818181"
set -g pane-active-border-style "fg=#7ea1b6"
set -g message-style "fg=#E8E2D6,bg=#4F6575"
set -g mode-style "fg=#E8E2D6,bg=#4F6575"
